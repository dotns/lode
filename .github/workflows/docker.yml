name: docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose assets to package (e.g. v0.1.0)"
        required: true
      # `latest` is opt-in. This workflow is manual-dispatch only and can be run
      # for ANY existing release tag (e.g. rebuilding an old version), so there
      # is no "newest tag" push path to auto-detect — unconditionally retagging
      # `latest` would move it backwards when dispatching for an old tag.
      # Default false: check the box only when publishing the newest release.
      tag_latest:
        description: "Also move the `latest` tag to this image"
        type: boolean
        default: false

env:
  IMAGE_NAME: dotns/lode

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve tag
        id: tag
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -eu
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download lode binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -eu
          mkdir -p docker-context/linux-amd64 docker-context/linux-arm64 release-assets
          gh release download "$TAG" \
            --pattern 'lode-linux-x64.tar.gz' \
            --pattern 'lode-linux-arm64.tar.gz' \
            --dir release-assets
          tar -xzf release-assets/lode-linux-x64.tar.gz   -C docker-context/linux-amd64
          tar -xzf release-assets/lode-linux-arm64.tar.gz -C docker-context/linux-arm64
          cp Dockerfile docker-context/Dockerfile
          ls -laR docker-context/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          # `latest` is gated behind the tag_latest input (see `on:` above) so a
          # dispatch for an old release tag cannot move `latest` backwards.
          flavor: |
            latest=${{ inputs.tag_latest }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PWD }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
