# svc-bun — lode loads the `tests/apps/web-bun` script artifact under a [runtime].
#
# distroless/static has no real `bun`, so the [runtime] download is the static
# `lodetest` stub (served by the local fileserver, no signature required for
# runtimes). lode downloads it to /data/runtime/bun, prepends it to PATH, and runs
# `bun app.ts` (= `lodetest app.ts`). The stub honours the same web-bun app
# contract: /version, readiness, graceful stop, bad-mode, and update-by-app-exit.
#
# The trusted key for the (signed) app artifacts is injected via LODE_TRUSTED_KEYS.
#
# The fileserver IP below is the standalone default — the e2e test rewrites it
# to its per-run derived address before `docker cp`ing this file in.

[global]
app      = "web-bun"
data_dir = "/data"

[update]
manifest       = "http://10.123.231.2:8080/web-bun/manifest.json"
asset          = "app.ts"   # the asset filename to install on this host (selection key, §3)
channel        = "stable"
policy         = "auto"
check_interval = 2

[http]
# The fileserver is a local, non-TLS fixture on a fixed compose IP (not loopback),
# so opt out of the default HTTPS-only gate for this deliberately-local test.
allow_insecure = true

[trust]
require_signature = "enforce"
# trusted_keys injected via env LODE_TRUSTED_KEYS

[command]
run     = "bun app.ts"   # bare `lode` -> `bun app.ts` (the long-running server; cwd = version dir)
exec    = "bun"
workdir = "{dir}"

[runtime]
runtime  = "bun"                                          # looked up on PATH first
download = "http://10.123.231.2:8080/runtime/bun"         # fetched (raw) when absent

[supervise]
restart       = "off"
readiness     = "state"
ready_timeout = 20
health_grace  = 3
stop_timeout  = 8
