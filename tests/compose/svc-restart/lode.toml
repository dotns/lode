# svc-restart — demonstrates the keep-alive crash-restart policy. With
# `restart = "always"` lode relaunches the child on any exit, bounded by
# `restart_max`; once the cap of consecutive restarts is hit lode PAUSES
# (status=error) and STAYS ALIVE — it never exits on app failure, so the container
# does not crash-loop. Its app is a crashing native binary (the web-rust BUILD_BAD=1
# build), so lode restarts it restart_max times then pauses — proving the bound and
# the keep-alive. A paused app recovers on an edited lode.toml / bumped
# restart_nonce / new target.
#
# policy = "off": this service never updates; it only exercises restart bounding.
#
# The fileserver IP below is the standalone default — the e2e test rewrites it
# to its per-run derived address before `docker cp`ing this file in.

[global]
app      = "crash"
data_dir = "/data"

[update]
manifest = "http://10.123.231.2:8080/crash/manifest.json"
asset    = "crashbin"   # the asset filename to install on this host (selection key, §3)
channel  = "stable"
policy   = "off"

[http]
# The fileserver is a local, non-TLS fixture on a fixed compose IP (not loopback),
# so opt out of the default HTTPS-only gate for this deliberately-local test.
allow_insecure = true

[trust]
require_signature = "enforce"
# trusted_keys injected via env LODE_TRUSTED_KEYS

[command]
run     = "./crashbin"
exec    = "./crashbin"
workdir = "{dir}"

[supervise]
restart             = "always"   # relaunch on any exit...
restart_max         = 3          # ...but give up after 3 consecutive restarts
restart_backoff     = 100        # ms (exponential base)
restart_backoff_max = 1000       # ms cap
readiness           = "none"
health_grace        = 2
stop_timeout        = 5
