# svc-rust — lode loads the native (no-runtime) `tests/apps/web-rust` binary.
#
# The crashing-v0.0.3 rollback artifact is a second web-rust binary built with
# BUILD_BAD=1. lode runs the binary directly (`run = "./web-rust"`): no [runtime].
#
# The publisher's trusted key is injected at runtime via LODE_TRUSTED_KEYS (it is
# generated per test run by `lode keygen`); everything else is static here. The
# manifest is fetched from the local fileserver over a fixed compose IP (no DNS);
# the IP below is the standalone default — the e2e test rewrites it to its per-run
# derived address before `docker cp`ing this file in.

[global]
app      = "web-rust"
data_dir = "/data"

[update]
manifest       = "http://10.123.231.2:8080/web-rust/manifest.json"
asset          = "web-rust"   # the asset filename to install on this host (selection key, §3)
channel        = "stable"
policy         = "auto"   # auto-apply newer channel-latest (v0.0.1 -> v0.0.2)
check_interval = 2        # seconds between update checks (fast for the test)

[http]
# The fileserver is a local, non-TLS fixture on a fixed compose IP (not loopback),
# so opt out of the default HTTPS-only gate for this deliberately-local test.
allow_insecure = true

[trust]
require_signature = "enforce"   # a valid ed25519 signature is mandatory
# trusted_keys injected via env LODE_TRUSTED_KEYS

[command]
run     = "./web-rust"   # bare `lode` -> run the native binary as the server (cwd = version dir)
exec    = "./web-rust"
workdir = "{dir}"

[supervise]
restart       = "off"     # mirror the child; updates/rollbacks still relaunch
readiness     = "state"   # commit a version only after it writes state.ready
ready_timeout = 20
health_grace  = 3         # a version that exits within 3s of activation -> rollback
stop_timeout  = 8
